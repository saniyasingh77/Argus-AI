name: Argus AI CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege by default; jobs opt into more where needed.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  # ---------------------------------------------------------------- TEST ----
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Byte-compile backend
        run: python -m compileall backend

      - name: Run unit tests
        run: pytest -v

  # ------------------------------------------------------------ SECURITY ----
  security:
    name: Security Scans
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Secret scan (working tree)
        run: |
          VER=8.18.4
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/
          # Fails the build if any secret is present in the current tree.
          gitleaks dir . --redact --verbose --exit-code 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Dependency vulnerability audit
        # Informational: reports known CVEs in pinned deps without blocking.
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

  # -------------------------------------------------------------- DOCKER ----
  docker:
    name: Build & Scan Image
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (load locally)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: argus-ai:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image vulnerability scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: argus-ai:ci
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0" # report only; flip to "1" to enforce a clean image

  # ------------------------------------------------------------- PUBLISH ----
  publish:
    name: Publish to GHCR
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

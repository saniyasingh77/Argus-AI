name: Argus AI CI/CD Pipeline

# ---------------------------------------------------------------------------
# Continuous Integration pipeline for Argus AI.
# Runs automatically on every push and pull request to the main branch.
#
# Stages:
#   1. test     - install dependencies, byte-compile, run the pytest suite
#   2. security - scan for committed secrets + audit dependencies (advisory)
#   3. docker   - verify the production Docker image builds successfully
#
# Continuous Deployment is handled by Render: it watches the main branch and
# auto-deploys the new Docker image whenever this pipeline succeeds
# (see render.yaml, "autoDeploy: true").
# ---------------------------------------------------------------------------

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------- TEST ----
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Byte-compile backend (syntax check)
        run: python -m compileall backend

      - name: Run unit tests
        run: python -m pytest -v

  # ------------------------------------------------------------ SECURITY ----
  # Advisory stage: reports issues but never blocks the build, so the
  # pipeline stays green while still demonstrating security tooling.
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Secret scan (gitleaks)
        continue-on-error: true
        run: |
          VER=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" | tar -xz gitleaks
          ./gitleaks dir . --redact --verbose

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Dependency vulnerability audit (pip-audit)
        continue-on-error: true
        run: |
          python -m pip install pip-audit
          pip-audit -r requirements.txt

  # -------------------------------------------------------------- DOCKER ----
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: argus-ai:ci
